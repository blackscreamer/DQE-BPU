<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DQE / BPU Pro</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ═══ DOCUMENT FONT ═══ */
:root{ --F:'Times New Roman',Times,serif; --SZ:11pt; }

/* ═══ PAGE LAYOUT ═══ */
body { background: #d0d0d0; font-family: var(--F); font-size: var(--SZ); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
#wrap { flex: 1; overflow: auto; padding: 14px; }

/* ═══ DOCUMENT ═══ */
#doc { background: #fff; max-width: 1000px; margin: 0 auto; border: 1px solid #999; padding: 14px 16px 22px; box-shadow: 0 2px 14px rgba(0,0,0,.2); }
#doc-hdr { text-align: center; margin-bottom: 10px; }
.hdr-line { width: 100%; text-align: center; border: none; outline: none; background: transparent; font-family: var(--F); color: #000; line-height: 1.7; display: block; }
.hdr-line.t1 { font-size: 13pt; font-weight: bold; text-transform: uppercase; text-decoration: underline; }
.hdr-line.t2 { font-size: 11pt; font-weight: bold; text-transform: uppercase; }
.hdr-line::placeholder { color: #bbb; font-weight: normal; text-decoration: none; text-transform: none; }
.doc-band { margin: 8px 0 0; border: 2px solid #000; padding: 5px; text-align: center; font-weight: bold; font-size: 12pt; text-transform: uppercase; }

/* ═══ TABLE ═══ */
#tbl { width: 100%; border-collapse: collapse; table-layout: fixed; }
col.cn { width: 70px; }
col.cd { width: auto; } /* Designation takes remaining space */
col.cu { width: 46px; }
/* Quantity and Price columns will be auto-sized by JS, but we set min-widths here */
col.cq { width: 82px; min-width: 82px; }
col.cp { width: 92px; min-width: 92px; }
col.ct { width: 92px; min-width: 92px; }

thead th { border: 1px solid #000; padding: 5px 4px; text-align: center; font-family: var(--F); font-size: 10pt; font-weight: bold; text-transform: uppercase; background: #d9d9d9; color: #000; vertical-align: middle; }
tbody td { border: 1px solid #000; padding: 0; vertical-align: middle; color: #000; }

input.di, textarea.di { display: block; width: 100%; padding: 5px 6px; border: none; outline: none; background: transparent; font-family: var(--F); font-size: var(--SZ); color: #000; }
textarea.di { resize: none; overflow: hidden; }
input.di:focus, textarea.di:focus { background: #fffbe6; outline: 2px solid #c8a000; outline-offset: -2px; }
input.ni { display: block; width: 100%; padding: 5px; border: none; outline: none; background: transparent; font-family: var(--F); font-size: var(--SZ); color: #000; text-align: right; }
input.ni:focus { background: #fffbe6; outline: 2px solid #c8a000; outline-offset: -2px; }
select.ui { display: block; width: 100%; padding: 5px 2px; border: none; outline: none; background: transparent; text-align: center; color: #000; font-family: var(--F); font-size: var(--SZ); cursor: pointer; }
.nc { text-align: center; padding: 4px 3px; font-family: var(--F); font-size: 10pt; white-space: nowrap; color: #000; }
.tc { text-align: right; padding: 5px 8px; font-family: var(--F); font-size: var(--SZ); white-space: nowrap; }
.tc.v { font-weight: bold; }

.tot-label { display: block; padding: 5px 8px; font-weight: bold; text-transform: uppercase; font-family: var(--F); font-size: var(--SZ); }
.tot-val { font-weight: bold; text-align: right; padding: 5px 10px; font-family: var(--F); font-size: var(--SZ); white-space: nowrap; }

tr.sel-row td { outline: 2px solid #1a56a0; outline-offset: -1px; }
.dragging { opacity: .3; outline: 2px dashed #1a56a0; }
.dov-top td { border-top: 3px solid #1a56a0 !important; }
.dov-bot td { border-bottom: 3px solid #1a56a0 !important; }

/* ═══ FLOATING ROW CONTROLS ═══ */
#float-ctrl {
  position: fixed; z-index: 500;
  background: #1e1e1e; border: 1px solid #444; border-radius: 6px;
  padding: 3px 5px; box-shadow: 0 3px 12px rgba(0,0,0,.45);
  display: flex; gap: 3px; align-items: center; pointer-events: auto;
}
#float-ctrl.hidden { display: none !important; }
.fc-btn { background: none; border: 1px solid #444; padding: 3px 8px; border-radius: 4px; color: #ccc; font-size: 10pt; cursor: pointer; line-height: 1; white-space: nowrap; font-family: var(--F); }
.fc-btn:hover { background: #4a6a9a; color: #fff; border-color: #7aacdd; }
.fc-btn.del:hover { background: #7a1010; color: #fff; border-color: #c03030; }
.fc-btn.dup:hover { background: #2a5a2a; color: #fff; border-color: #5aaa5a; }
.fc-sep { width: 1px; height: 18px; background: #444; }
.drag-h { cursor: grab; color: #888; font-size: 14pt; padding: 0 4px; user-select: none; border: 1px solid #444; border-radius: 3px; background: #2a2a2a; line-height: 1.4; }
.drag-h:active { cursor: grabbing; background: #3a3a3a; }

/* ═══ TOOLBAR TWEAKS ═══ */
#appbar { background: #1e2535 !important; }
.navbar-brand { font-family: var(--F); font-size: 13pt; font-weight: bold; letter-spacing: .5px; }
.tva-inp { width: 56px; padding: 3px 6px; border: 1px solid #495057; border-radius: 4px; background: #2d3748; color: #e2e8f0; text-align: right; font-size: 11pt; font-family: var(--F); }
.tva-inp:focus { outline: none; border-color: #4a90d9; }
.toolbar-sep { width: 1px; height: 24px; background: #444; margin: 0 2px; flex-shrink: 0; }

/* ═══ MODE TOGGLE ═══ */
.mode-grp { background: #111; border-radius: 5px; padding: 2px; display: flex; gap: 2px; }
.mbtn { padding: 3px 14px; border: none; border-radius: 4px; font-weight: bold; font-size: 10pt; color: #888; background: transparent; cursor: pointer; font-family: var(--F); }
.mbtn.on { background: #1a56a0; color: #fff; }
.mbtn:hover:not(.on) { color: #fff; }

/* ═══ FOOTER ═══ */
#foot { background: #1e2535; border-top: 2px solid #111; padding: 6px 16px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap; flex-shrink: 0; }
.fi { display: flex; flex-direction: column; gap: 1px; }
.fl { font-size: 7.5pt; font-weight: bold; color: #7a90b0; letter-spacing: 1px; text-transform: uppercase; font-family: var(--F); }
.fv { font-size: 13pt; font-weight: bold; color: #fff; font-family: var(--F); }
.fv.big { color: #6fd86f; }
.fsep { width: 1px; height: 28px; background: #3a4a5a; }

/* ═══ OFFCANVAS COLOR PICKER ═══ */
.offcanvas { max-width: 280px; }
.offcanvas-header { background: #1e2535; color: #fff; }
.offcanvas-header .btn-close { filter: invert(1); }
.offcanvas-body { background: #f8f9fa; }
.cp-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 6px; padding: 4px 0; border-bottom: 1px solid #e9ecef; }
.cp-row:last-of-type { border-bottom: none; }
.cp-row label { font-size: 11px; color: #333; flex: 1; font-family: sans-serif; }
.cp-row input[type=color] { width: 32px; height: 26px; border: 1px solid #ccc; background: none; cursor: pointer; border-radius: 3px; padding: 2px; }

/* ═══ AUTOSAVE INDICATOR ═══ */
#save-ind { font-size: 9pt; color: #888; transition: color 0.3s; }
#save-ind.saved { color: #6fd86f; }
#save-ind.error { color: #ff6b6b; }

/* ═══ BPU SUBLINE ═══ */
.bpu-subline {
  font-size: 9pt; font-style: italic; color: #555;
  padding: 1px 6px 4px 6px;
  font-family: var(--F);
  text-transform: uppercase;
  line-height: 1.4;
  border-top: 1px dotted #ccc;
  margin-top: 2px;
}

/* ═══ BPU PRICE COLUMN ═══ */
col.cp-bpu { width: 130px; }

/* ═══ MULTI-SELECT ═══ */
tr.sel-multi td { outline: 2px solid #2a8a2a; outline-offset: -1px; }

/* ═══ NO-PRICES MODE ═══ */
#tbl.no-prices .price-cell { visibility: hidden !important; }
#tbl.no-prices .rts, #tbl.no-prices .rtc,
#tbl.no-prices .rgt, #tbl.no-prices .rtva,
#tbl.no-prices .rttc { display: none !important; }

/* ═══ PRINT ═══ */
@media print {
  #appbar, #foot, #nf, #float-ctrl, .offcanvas, .offcanvas-backdrop { display: none !important; }
  body, #wrap { height: auto; overflow: visible; background: #fff; }
  #doc { box-shadow: none; border: none; padding: 0; max-width: 100%; }
  tr.sel-row td, tr.sel-multi td { outline: none; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  #tbl.no-prices .rts, #tbl.no-prices .rtc,
  #tbl.no-prices .rgt, #tbl.no-prices .rtva,
  #tbl.no-prices .rttc { display: none !important; }
}

/* ═══ TOAST ═══ */
#toast-ct { position: fixed; bottom: 56px; right: 14px; z-index: 9999; }
</style>
</head>
<body>

<!-- ═══ APP BAR (Navbar) ═══ -->
<nav id="appbar" class="navbar navbar-dark px-2 py-1" style="flex-shrink:0">
  <div class="d-flex align-items-center gap-2 flex-wrap w-100">

    <!-- Brand -->
    <span class="navbar-brand me-1 mb-0" style="font-size:12pt">
      <i class="bi bi-file-earmark-text-fill text-primary"></i> DQE / BPU
    </span>

    <div class="toolbar-sep"></div>
    
    <!-- Autosave Indicator -->
    <span id="save-ind"><i class="bi bi-cloud-check"></i> Auto</span>

    <div class="toolbar-sep"></div>

    <!-- Mode toggle -->
    <div class="mode-grp">
      <button class="mbtn on" id="bdqe" onclick="setMode('DQE')">DQE</button>
      <button class="mbtn"    id="bbpu" onclick="setMode('BPU')">BPU</button>
    </div>

    <div class="toolbar-sep"></div>

    <!-- Add dropdown -->
    <div class="dropdown">
      <button class="btn btn-sm btn-primary fw-bold dropdown-toggle" type="button" data-bs-toggle="dropdown">
        <i class="bi bi-plus-lg"></i> Ajouter
      </button>
      <ul class="dropdown-menu dropdown-menu-dark" style="font-family:var(--F);font-size:10pt">
        <li><button class="dropdown-item" onclick="addRow('chap')"><i class="bi bi-bookmark-fill text-danger me-2"></i>Chapitre</button></li>
        <li><hr class="dropdown-divider"/></li>
        <li><button class="dropdown-item" onclick="addRow('sub',1)"><i class="bi bi-chevron-right text-warning me-2"></i>Sous-chapitre niv. 1</button></li>
        <li><button class="dropdown-item" onclick="addRow('sub',2)"><i class="bi bi-chevron-double-right text-info me-2"></i>Sous-chapitre niv. 2</button></li>
        <li><button class="dropdown-item" onclick="addRow('sub',3)"><i class="bi bi-chevron-bar-right text-success me-2"></i>Sous-chapitre niv. 3</button></li>
        <li><hr class="dropdown-divider"/></li>
        <li><button class="dropdown-item" onclick="addRow('art')"><i class="bi bi-file-text me-2"></i>Article <kbd class="ms-1">+</kbd></button></li>
        <li><button class="dropdown-item" onclick="addRow('subart')"><i class="bi bi-file-earmark me-2"></i>Sous-article (a, b, c…)</button></li>
        <li><button class="dropdown-item" onclick="addRow('blank')"><i class="bi bi-dash me-2"></i>Ligne vide / description</button></li>
      </ul>
    </div>
    
    <!-- Undo/Redo -->
    <button class="btn btn-sm btn-outline-secondary text-light border-secondary" onclick="undo()" title="Annuler (Ctrl+Z)">

    </button>
    <button class="btn btn-sm btn-outline-secondary text-light border-secondary" onclick="redo()" title="Rétablir (Ctrl+Y)">
      <i class="bi bi-arrow-clockwise"></i>
    </button>

    <!-- Collapse buttons -->
    <button class="btn btn-sm btn-outline-secondary text-light border-secondary" onclick="collapseAll(true)" title="Réduire tout">
      <i class="bi bi-arrows-collapse"></i> <span class="d-none d-lg-inline">Réduire</span>
    </button>
    <button class="btn btn-sm btn-outline-secondary text-light border-secondary" onclick="collapseAll(false)" title="Développer tout">
      <i class="bi bi-arrows-expand"></i> <span class="d-none d-lg-inline">Développer</span>
    </button>

    <div class="toolbar-sep"></div>

    <!-- Colors -->
    <button class="btn btn-sm btn-outline-secondary text-light border-secondary"
            data-bs-toggle="offcanvas" data-bs-target="#colorpop" onclick="syncColorPicker()"
            title="Couleurs">
      <i class="bi bi-palette-fill"></i> <span class="d-none d-lg-inline">Couleurs</span>
    </button>

    <div class="toolbar-sep"></div>

    <!-- File actions -->
    <button class="btn btn-sm btn-outline-secondary text-light border-secondary" onclick="saveFile(false)" title="Sauvegarder (Écraser)">
      <i class="bi bi-floppy-fill"></i> <span class="d-none d-lg-inline">Sauvegarder</span>
    </button>
    
    <button class="btn btn-sm btn-outline-secondary text-light border-secondary" onclick="saveFile(true)" title="Sauvegarder sous...">
      <i class="bi bi-file-earmark-plus"></i> <span class="d-none d-lg-inline">Nouveau Fichier</span>
    </button>

    <label class="btn btn-sm btn-outline-secondary text-light border-secondary mb-0" style="cursor:pointer" title="Ouvrir">
      <i class="bi bi-folder2-open"></i> <span class="d-none d-lg-inline">Ouvrir</span>
      <input type="file" accept=".json" onchange="openFile(this)" style="display:none"/>
    </label>
    
    <!-- NEW: Import Excel -->
    <label class="btn btn-sm btn-outline-info text-light border-info mb-0" style="cursor:pointer" title="Importer Excel">
      <i class="bi bi-file-earmark-spreadsheet"></i> <span class="d-none d-lg-inline">Import XLS</span>
      <input type="file" accept=".xlsx,.xls" onchange="importExcel(this)" style="display:none"/>
    </label>

    <button class="btn btn-sm btn-outline-success" onclick="doExport()" title="Exporter Excel">
      <i class="bi bi-file-earmark-excel-fill"></i> <span class="d-none d-lg-inline">Excel</span>
    </button>
    <button class="btn btn-sm btn-outline-light" onclick="window.print()" title="Imprimer">
      <i class="bi bi-printer-fill"></i> <span class="d-none d-lg-inline">Imprimer</span>
    </button>

    <div class="toolbar-sep"></div>

    <!-- Prices toggle -->
    <button id="btn-prices" class="btn btn-sm btn-outline-warning text-light"

      <i class="bi bi-eye-fill"></i> <span class="d-none d-lg-inline">Prix</span>
    </button>

    <div class="toolbar-sep"></div>

      <input class="tva-inp" id="tva" type="number" value="19" min="0" max="100" step="0.5" oninput="handleTvaChange()"/>
    </div>

  </div>
</nav>

<!-- ═══ FLOATING ROW CONTROLS ═══ -->
<div id="float-ctrl" class="hidden">
  <span class="drag-h" id="fc-drag" title="Déplacer">⠿</span>
  <div class="fc-sep"></div>
  <span id="fc-count" style="display:none;color:#aef;font-size:9pt;padding:0 4px;white-space:nowrap"></span>
  <button class="fc-btn dup" onclick="dupSelected()" title="Dupliquer">⧉ Dupliquer</button>
  <button class="fc-btn del" onclick="delSelected()" title="Supprimer">✕ Supprimer</button>
</div>

<!-- ═══ COLOR PICKER (Offcanvas) ═══ -->

  <div class="offcanvas-header">
    <h6 class="offcanvas-title mb-0"><i class="bi bi-palette-fill me-2"></i>Couleurs par type</h6>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">

    <div class="cp-row"><label>Chapitre</label>
      <input type="color" id="cc-chap-bg" value="#c00000" oninput="applyColors()"/>

      <input type="color" id="cc-sub1-bg" value="#ffff00" oninput="applyColors()"/>

    </div>
    <div class="cp-row"><label>Sous-chap niv.2</label>
      <input type="color" id="cc-sub2-bg" value="#bdd7ee" oninput="applyColors()"/>
      <input type="color" id="cc-sub2-fg" value="#000000" oninput="applyColors()"/>
    </div>
    <div class="cp-row"><label>Sous-chap niv.3</label>
      <input type="color" id="cc-sub3-bg" value="#e2efda" oninput="applyColors()"/>
      <input type="color" id="cc-sub3-fg" value="#000000" oninput="applyColors()"/>
    </div>
    <div class="cp-row"><label>Article</label>
      <input type="color" id="cc-art-bg" value="#ffffff" oninput="applyColors()"/>
      <input type="color" id="cc-art-fg" value="#000000" oninput="applyColors()"/>
    </div>
    <div class="cp-row"><label>Sous-article</label>
      <input type="color" id="cc-sa-bg"  value="#f5f5f5" oninput="applyColors()"/>
      <input type="color" id="cc-sa-fg"  value="#000000" oninput="applyColors()"/>
    </div>
    <div class="cp-row"><label>Total sous-chapitre</label>
      <input type="color" id="cc-ts-bg" value="#c6efce" oninput="applyColors()"/>

    <div class="cp-row"><label>Total chapitre</label>

      <input type="color" id="cc-gt-fg" value="#000000" oninput="applyColors()"/>
    </div>

    <button class="btn btn-sm btn-secondary w-100 mt-3" data-bs-dismiss="offcanvas">
      <i class="bi bi-check-lg me-1"></i>Fermer
    </button>
  </div>
</div>

<!-- ═══ DOCUMENT ═══ -->
<div id="wrap">
<div id="doc">
  <div id="doc-hdr">
    <input class="hdr-line t1" id="hl1" type="text" placeholder="TITRE DU PROJET…"/>
    <input class="hdr-line t2" id="hl2" type="text" placeholder="Sous-titre ligne 2…"/>
    <input class="hdr-line t2" id="hl3" type="text" placeholder="Sous-titre ligne 3…"/>

</div>

      <div class="toast-body fw-bold" id="nf-msg" style="font-family:var(--F);font-size:10pt"></div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* ═══════════════════════════════════════════
   1. CORE HELPERS & STATE
═══════════════════════════════════════════ */
const uid  = ()=>'r'+(nid++);
const num  = v=>parseFloat(String(v||0).replace(',','.'))||0;
const da   = n=>n.toLocaleString('fr-DZ',{minimumFractionDigits:2,maximumFractionDigits:2})+' DA';
const esc  = s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const LETTERS='abcdefghijklmnopqrstuvwxyz';
const UNITS=['M²','M³','ML','U','Ens','Kg','T','H','J','Forfait','Lot','M','Ml'];
const ROMAN=['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX'];
function toRoman(n){ return ROMAN[n-1]||String(n); }

/* ═══ BPU UNIT WORDS ═══ */
const UNIT_WORDS = {
  'M²':'LE METRE CARRE','M³':'LE METRE CUBE',
  'ML':'LE METRE LINEAIRE','M':'LE METRE',
  'Ml':'LE MILLILITRE','U':"L'UNITE",
  'Ens':"L'ENSEMBLE",'Kg':'LE KILOGRAMME',
  'T':'LA TONNE','H':"L'HEURE",
  'J':'LE JOUR','Forfait':'LE FORFAIT','Lot':'LE LOT',
};

/* ═══ FRENCH NUMBER TO WORDS ═══ */
function numToWordsFr(n){
  n=Math.round(n);
  if(n===0)return'ZERO';
  if(n<0)return'MOINS '+numToWordsFr(-n);
  const ones=['','UN','DEUX','TROIS','QUATRE','CINQ','SIX','SEPT','HUIT','NEUF',
    'DIX','ONZE','DOUZE','TREIZE','QUATORZE','QUINZE','SEIZE',
    'DIX-SEPT','DIX-HUIT','DIX-NEUF'];
  const tens=['','','VINGT','TRENTE','QUARANTE','CINQUANTE',
    'SOIXANTE','SOIXANTE','QUATRE-VINGT','QUATRE-VINGT'];
  function b100(n){
    if(n<20)return ones[n];
    const t=Math.floor(n/10),u=n%10;
    if(t===7)return u===1?'SOIXANTE ET ONZE':'SOIXANTE-'+ones[10+u];
    if(t===8)return u===0?'QUATRE-VINGTS':'QUATRE-VINGT-'+ones[u];
    if(t===9)return u===0?'QUATRE-VINGT-DIX':'QUATRE-VINGT-'+ones[10+u];
    if(u===0)return tens[t];
    return tens[t]+(u===1?' ET UN':'-'+ones[u]);
  }
  function b1000(n){
    if(n<100)return b100(n);
    const h=Math.floor(n/100),r=n%100;
    const hp=(h===1?'CENT':ones[h]+' CENT')+(r===0&&h>1?'S':'');
    return r===0?hp:hp+' '+b100(r);
  }
  let res='',rem=n;
  if(rem>=1000000){
    const m=Math.floor(rem/1000000);
    res+=b1000(m)+' MILLION'+(m>1?'S':'');
    rem%=1000000; if(rem)res+=' ';
  }
  if(rem>=1000){
    const k=Math.floor(rem/1000);
    res+=(k===1?'MILLE':b1000(k)+' MILLE');
    rem%=1000; if(rem)res+=' ';
  }
  if(rem>0)res+=b1000(rem);
  return res;
}

function buildBpuSubline(unite,pu){
  const uw=UNIT_WORDS[unite]||(unite?unite.toUpperCase():'');
  if(!showPrices||!pu)return uw;
  return uw+'\u00A0: '+numToWordsFr(pu)+' DINAR ALGERIEN';
}

/* ═══════════════════════════════════════════
   2. HISTORY (UNDO/REDO)
═══════════════════════════════════════════ */
let history = [];
let hIdx = -1;
const MAX_HIST = 50;

function snapshot() {
    history = history.slice(0, hIdx + 1);
    history.push(JSON.stringify(rows));
    hIdx++;
    if(history.length > MAX_HIST) { history.shift(); hIdx--; }
}

function undo() {
    if(hIdx > 0) {
        hIdx--;
        rows = JSON.parse(history[hIdx]);
        render();
        notif("↶ Annulé");
        triggerAutosave();
    }
}

function redo() {
    if(hIdx < history.length - 1) {
        hIdx++;
        rows = JSON.parse(history[hIdx]);
        render();
        notif("↷ Rétabli");
        triggerAutosave();
    }
}

document.addEventListener('keydown', e => {
    if(e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
    if(e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
});

const STORAGE_KEY = 'dqe_app_v3_autosave';
let saveTimeout;

function getSaveData() {

function saveLocal() {

}

function applyLoadedData(d){
    rows = d.rows || [];
    nid = d.nid || 1;
    if(d.C) C = d.C;
    document.getElementById('tva').value = d.tva || 19;
    document.getElementById('hl1').value = d.l1 || '';

}

function loadLocal() {
    const str = localStorage.getItem(STORAGE_KEY);
    if(str) {
        try {
            const d = JSON.parse(str);
            applyLoadedData(d);
            return true;
        } catch(e) { console.error("Corrupted local storage"); return false; }
    }
    return false;
}

// 5-minute Autosave for Disk File (if supported)
const AUTOSAVE_INTERVAL = 5 * 60 * 1000; // 5 minutes
setInterval(async () => {

// Debounced LocalStorage save
function triggerAutosave() {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(saveLocal, 500); // Quick save to browser
}

// --- FILE SYSTEM API (Save Same File) ---
async function saveFile(saveAs) {
    const data = getSaveData();
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    
    // Browser support check
    const supportsFS = 'showSaveFilePicker' in window;

    if (!supportsFS || !fileHandle || saveAs) {
        // Create new file or fallback
        try {
            if (supportsFS) {
                const options = {
                    suggestedName: (document.getElementById('hl1').value || 'devis') + '.json',
                    types: [{ description: 'JSON File', accept: { 'application/json': ['.json'] } }]
                };
                fileHandle = await window.showSaveFilePicker(options);
            } else {
                // Fallback for Firefox/Safari
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = (data.l1 || 'devis').replace(/\s+/g,'_').substring(0,40)+'.json';
                a.click();
                notif('✓ Fichier téléchargé');
                return;
            }
        } catch(e) {
            console.log('Save cancelled');
            return;
        }
    }

    // Write to fileHandle
    try {
        const writable = await fileHandle.createWritable();
        await writable.write(blob);
        await writable.close();
        notif('✓ Fichier sauvegardé');
    } catch(e) {
        console.error(e);
        notif('⚠ Erreur de sauvegarde');
    }
}

async function openFile(inp) {
    const f = inp.files[0];
    if(!f) return;
    
    // Try to get handle (Chrome/Edge)
    if ('showOpenFilePicker' in window) {
        try {
            // Note: inp.files is a FileList, not a FileSystemHandle. 
            // To keep 'Save Same File' functionality, we'd ideally use showOpenFilePicker API
            // But for simplicity with the <input> tag, we just read the file.
            // We lose the handle if we use the input tag. 
            // Ideally, we should change "Open" to use a button + showOpenFilePicker.
        } catch(e) {}
    }

    const reader = new FileReader();
    reader.onload = e => {
        try {
            const d = JSON.parse(e.target.result);
            if(!d.rows) throw 0;
            applyLoadedData(d);
            render(); 
            snapshot();
            saveLocal();
            notif('✓ Projet chargé');
        } catch { notif('⚠ Fichier invalide'); }
    };
    reader.readAsText(f);
    inp.value = '';
}

function selectRow(id,trEl,e){
  if(e&&(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT'))return;

  if(e&&(e.ctrlKey||e.metaKey)){
    // Ctrl+click: toggle this row in multi-selection
    if(selIds.has(id)){selIds.delete(id);}
    else{selIds.add(id);}
    selId=id;
  } else if(e&&e.shiftKey&&selId){
    // Shift+click: range select from anchor selId to current id
    const fromIdx=rows.findIndex(r=>r.id===selId);
    const toIdx=rows.findIndex(r=>r.id===id);
    const lo=Math.min(fromIdx,toIdx), hi=Math.max(fromIdx,toIdx);
    for(let i=lo;i<=hi;i++)selIds.add(rows[i].id);
    // selId stays as anchor
  } else {
    // Plain click: single select
    selIds.clear();
    selIds.add(id);
    selId=id;
  }

  // Apply visual classes
  document.querySelectorAll('tr.sel-row,tr.sel-multi').forEach(t=>{
    t.classList.remove('sel-row','sel-multi');
  });
  selIds.forEach(sid=>{
    const tr=document.getElementById('ro-'+sid);
    if(tr)tr.classList.add(selIds.size===1?'sel-row':'sel-multi');
  });
  // Anchor row always gets sel-row highlight
  if(trEl){
    if(selIds.size>1){trEl.classList.remove('sel-multi');trEl.classList.add('sel-row');}
    positionFloatCtrl(trEl);
  }
}

function positionFloatCtrl(trEl){
  const fc=document.getElementById('float-ctrl');
  if(!trEl){fc.classList.add('hidden');return;}
  fc.classList.remove('hidden');
  const rect=trEl.getBoundingClientRect();
  const top=rect.top+rect.height/2-16;
  let left=rect.right+6;
  if(left+210>window.innerWidth)left=rect.right-215;
  fc.style.top=Math.max(44,top)+'px';
  fc.style.left=Math.max(4,left)+'px';
  const cnt=document.getElementById('fc-count');
  if(cnt){cnt.style.display=selIds.size>1?'':'none';cnt.textContent=selIds.size>1?selIds.size+' sél.':'';}
  const dh=document.getElementById('fc-drag');
  dh.ondragstart=null;
  dh.draggable=true;
  dh.ondragstart=(ev)=>{
    ev.dataTransfer.effectAllowed='move';
    // Drag all selected if current row is in selection
    dragIds=selIds.has(selId)&&selIds.size>1?[...selIds]:([selId]);
    dragIds=rows.filter(r=>dragIds.includes(r.id)).map(r=>r.id); // sort by row order
    setTimeout(()=>{
      dragIds.forEach(did=>{const t=document.getElementById('ro-'+did);if(t)t.classList.add('dragging');});
    },0);
  };
}

function clearSelection(){
  selId=null;
  selIds.clear();
  document.querySelectorAll('tr.sel-row,tr.sel-multi').forEach(t=>t.classList.remove('sel-row','sel-multi'));
  document.getElementById('float-ctrl').classList.add('hidden');
}

function insertIdx(){
  if(selId===null)return rows.length;
  const idx=rows.findIndex(r=>r.id===selId);
  return idx<0?rows.length:idx+1;
}

function lastUniteBefore(insertIdx){
  for(let i=insertIdx-1;i>=0;i--){
    const r=rows[i];
    if(r.type==='art'||r.type==='subart')return r.unite;
  }
  return 'M²';
}

function addRow(type,level){
  snapshot(); 
  const id=uid();
  let obj;
  const idx=insertIdx();
  if(type==='chap')   obj={type,id,desig:'',collapsed:false};
  if(type==='sub')    obj={type,id,desig:'',level:level||1,collapsed:false};
  if(type==='art')    obj={type,id,desig:'',unite:lastUniteBefore(idx),qty:'',pu:''};
  if(type==='subart') obj={type,id,desig:'',unite:lastUniteBefore(idx),qty:'',pu:''};
  if(type==='blank')  obj={type,id,desig:''};
  rows.splice(idx,0,obj);
  selId=id;
  render();
  setTimeout(()=>{
    const tr=document.getElementById('ro-'+id);
    if(tr){
      tr.classList.add('sel-row');
      positionFloatCtrl(tr);
      const inp=tr.querySelector('input.di,textarea.di');
      if(inp){inp.focus();inp.select();}
    }
  },35);
  triggerAutosave();
}

document.addEventListener('keydown',e=>{
  if(e.key==='+'&&!e.ctrlKey&&!e.metaKey&&
     e.target.tagName!=='INPUT'&&e.target.tagName!=='TEXTAREA'){
    e.preventDefault();addRow('art');
  }
});

function delSelected(){
  if(!selId&&!selIds.size)return;
  snapshot();
  const toDelete=selIds.size>0?new Set(selIds):new Set([selId]);
  rows=rows.filter(r=>!toDelete.has(r.id));
  selId=null; selIds.clear();
  document.getElementById('float-ctrl').classList.add('hidden');
  render();
  triggerAutosave();
  notif('✕ '+toDelete.size+' supprimé'+(toDelete.size>1?'s':''));
}

function dupSelected(){
  if(!selId&&!selIds.size)return;
  snapshot();
  const ids=selIds.size>0?[...selIds]:[selId];
  // Sort by row order
  const ordered=rows.filter(r=>ids.includes(r.id));
  if(!ordered.length)return;
  const lastIdx=Math.max(...ordered.map(r=>rows.indexOf(r)));
  const newIds=new Set();
  const clones=ordered.map(r=>{const n={...r,id:uid()};newIds.add(n.id);return n;});
  rows.splice(lastIdx+1,0,...clones);
  selIds=newIds; selId=clones[0].id;
  render();
  setTimeout(()=>{
    const tr=document.getElementById('ro-'+selId);
    if(tr){tr.classList.add('sel-row');positionFloatCtrl(tr);}
  },35);
  triggerAutosave();
  notif('✓ '+clones.length+' dupliqué'+(clones.length>1?'s':''));
}

function upd(id, field, val) {
    const r = rows.find(r => r.id === id);
    if (r) {
        r[field] = val;
        recalc();
        triggerAutosave();
    }
}

function collapseAll(v){

  render();

function buildVisibility(){
  const hidden=new Set();
  let collapsedChap=false,collapsedSubLv=null;
  rows.forEach((r,i)=>{
    if(r.type==='chap'){collapsedChap=r.collapsed;collapsedSubLv=null;return;}
    if(r.type==='sub'){
      if(collapsedChap){hidden.add(i);collapsedSubLv=null;return;}
      if(collapsedSubLv!==null&&r.level<=collapsedSubLv)collapsedSubLv=null;
      if(collapsedSubLv!==null){hidden.add(i);return;}
      if(r.collapsed)collapsedSubLv=r.level;
      return;
    }
    if(collapsedChap||collapsedSubLv!==null)hidden.add(i);
  });
  return hidden;
}

/* ═══════════════════════════════════════════
   8. NUMBERING & TOTALS
═══════════════════════════════════════════ */
function buildNums(){
  let chapN=0,subN=0,artN=0,saIdx=0;
  const nums=[],letters=[];
  rows.forEach(r=>{
    if(r.type==='chap'){chapN++;artN=0;saIdx=0;nums.push(toRoman(chapN));letters.push('');}
    else if(r.type==='sub'){subN++;artN=0;saIdx=0;nums.push(String(subN));letters.push('');}
    else if(r.type==='art'){artN++;saIdx=0;const a=artN<10?'0'+artN:String(artN);nums.push(subN+'.'+a);letters.push('');}
    else if(r.type==='subart'){nums.push('');letters.push(LETTERS[saIdx]||String(saIdx+1));saIdx++;}
    else{nums.push('');letters.push('');}
  });
  return{nums,letters};
}

function artHasSubarts(id){
  const idx=rows.findIndex(r=>r.id===id);
  if(idx<0)return false;
  for(let i=idx+1;i<rows.length;i++){
    if(rows[i].type==='blank')continue;
    return rows[i].type==='subart';
  }
  return false;
}
function artParentTotal(r){
  const idx=rows.findIndex(x=>x.id===r.id);
  let total=0;
  for(let i=idx+1;i<rows.length;i++){
    if(rows[i].type==='blank')continue;
    if(rows[i].type!=='subart')break;
    total+=artTotal(rows[i]);
  }
  return total;
}
function artTotal(r){
  if(r.type!=='art'&&r.type!=='subart')return 0;
  if(mode==='BPU')return num(r.pu);
  return num(r.qty)*num(r.pu);
}
function computeTotals(){
  const chapT={},subT={};
  let ci=null,subStack=[];
  rows.forEach(r=>{
    if(r.type==='chap'){ci=r.id;chapT[ci]=0;subStack=[];}
    else if(r.type==='sub'){
      subStack=subStack.filter(s=>s.level<(r.level||1));
      subStack.push({id:r.id,level:r.level||1});
      subT[r.id]=0;
    } else if(r.type==='art'){
      const t=artHasSubarts(r.id)?artParentTotal(r):artTotal(r);
      if(ci)chapT[ci]=(chapT[ci]||0)+t;
      subStack.forEach(s=>{subT[s.id]=(subT[s.id]||0)+t;});
    }
  });
  return{chapT,subT};
}
function grandTotal(){
  return rows.reduce((s,r)=>{
    if(r.type==='art'){
      return s+(artHasSubarts(r.id)?artParentTotal(r):artTotal(r));
    }
    return s;
  },0);
}

function recalc(){
  const{chapT,subT}=computeTotals();
  const isBPU=mode==='BPU';

  if(!isBPU){
    rows.filter(r=>r.type==='art'||r.type==='subart').forEach(r=>{
      const el=document.getElementById('at-'+r.id);if(!el)return;
      const t=(r.type==='art'&&artHasSubarts(r.id))?0:artTotal(r);
      el.textContent=t?da(t):'';
      el.className='tc'+(t?' v':'')+(showPrices?'':' price-cell');
    });
    Object.entries(subT).forEach(([id,t])=>{const el=document.getElementById('st-'+id);if(el)el.textContent=da(t);});
    Object.entries(chapT).forEach(([id,t])=>{const el=document.getElementById('ct-'+id);if(el)el.textContent=da(t);});
    const grand=grandTotal();
    const tvaPct=num(document.getElementById('tva').value)/100;
    const tvaAmt=grand*tvaPct;
    const elGt=document.getElementById('gt-val');if(elGt)elGt.textContent=da(grand);
    const elTva=document.getElementById('tva-val');if(elTva)elTva.textContent=da(tvaAmt);
    const elTtc=document.getElementById('ttc-val');if(elTtc)elTtc.textContent=da(grand+tvaAmt);
    const elLbl=document.getElementById('tva-label');if(elLbl)elLbl.textContent='TVA ('+document.getElementById('tva').value+'%)';
    document.getElementById('fht').textContent=da(grand);
    document.getElementById('ftva').textContent=da(tvaAmt);
    document.getElementById('fttc').textContent=da(grand+tvaAmt);
  }else{
    // BPU: update sublines live when pu/unite changes
    rows.filter(r=>r.type==='art'||r.type==='subart').forEach(r=>{
      const sl=document.getElementById('sl-'+r.id);
      if(sl){
        const bPu=r.bpu_pu!==undefined?r.bpu_pu:r.pu;
        const bUnite=r.bpu_unite!==undefined?r.bpu_unite:r.unite;
        sl.textContent=buildBpuSubline(bUnite,num(bPu));
      }
    });
    document.getElementById('fht').textContent='—';
    document.getElementById('ftva').textContent='—';
    document.getElementById('fttc').textContent='—';
  }

  document.getElementById('fpct').textContent=document.getElementById('tva').value;
  document.getElementById('fcnt').textContent=rows.filter(r=>r.type==='art').length;
  adjustColumns();
}

/* ═══════════════════════════════════════════
   9. DYNAMIC COLUMN WIDTH
═══════════════════════════════════════════ */
function adjustColumns() {
    // We measure the width needed for the largest number in the footer
    // And apply it to the table columns
    const cols = {
        qty: document.querySelector('col.cq'),
        pu: document.querySelector('col.cp'),
        tot: document.querySelector('col.ct')
    };

    // Measure footer values
    const fTot = document.getElementById('fttc');
    const fHt = document.getElementById('fht');
    
    // Create temporary span to measure text
    const span = document.createElement('span');
    span.style.visibility = 'hidden';
    span.style.position = 'absolute';
    span.style.fontFamily = "'Times New Roman', Times, serif";
    span.style.fontWeight = 'bold';
    span.style.fontSize = '11pt';
    span.style.padding = '0 10px'; // Cell padding
    document.body.appendChild(span);

    // Measure Total (largest number usually)
    span.textContent = fTot.textContent;
    let maxW = span.offsetWidth;
    
    // Add a bit of buffer for borders/padding
    maxW += 10; 
    
    // Set Minimums
    const minW = 75;
    if(maxW < minW) maxW = minW;

    // Apply to columns
    // Note: In BPU mode, Quantity is hidden, handled by CSS
    
    // Price Unit usually shorter, but we can keep it reasonable
    // Let's fix Unit Price to be slightly smaller than Total, or same
    const puW = 90; // Fixed width for Unit Price is usually fine
    
    // Set widths
    if(cols.pu) cols.pu.style.width = puW + 'px';
    if(cols.tot) cols.tot.style.width = maxW + 'px';
    
    // Quantity Width
    if(cols.qty) {
        // Measure qty
        span.style.fontWeight = 'normal';
        // Find largest qty in rows? Too expensive. Just use a decent estimate.
        const qtyW = 70;
        cols.qty.style.width = qtyW + 'px';
    }

    document.body.removeChild(span);
}

/* ═══════════════════════════════════════════
   11. DRAG & DROP
═══════════════════════════════════════════ */
let dragIds=[];
function dov2(e,tr){
  e.preventDefault();
  document.querySelectorAll('.dov-top,.dov-bot').forEach(el=>el.classList.remove('dov-top','dov-bot'));
  const rect=tr.getBoundingClientRect();
  tr.classList.add(e.clientY<rect.top+rect.height/2?'dov-top':'dov-bot');
}
function dlv2(tr){tr.classList.remove('dov-top','dov-bot');}
function dp2(e,tr){
  e.preventDefault();
  document.querySelectorAll('.dov-top,.dov-bot').forEach(el=>el.classList.remove('dov-top','dov-bot'));
  const toId=tr.id.replace('ro-','');
  if(!dragIds.length||dragIds.includes(toId)){dragIds=[];return;}
  dragIds.forEach(did=>{const t=document.getElementById('ro-'+did);if(t)t.classList.remove('dragging');});
  const ti=rows.findIndex(r=>r.id===toId);
  if(ti<0){dragIds=[];return;}
  snapshot();
  const rect=tr.getBoundingClientRect();
  const before=e.clientY<rect.top+rect.height/2;
  // Collect all blocks for dragged rows
  let block=[];
  dragIds.forEach(did=>{
    const fi=rows.findIndex(r=>r.id===did);
    if(fi>=0&&!block.find(x=>x.id===did)){block.push(...extractBlock(fi));}
  });
  // Remove them
  const blockIds=new Set(block.map(r=>r.id));
  rows=rows.filter(r=>!blockIds.has(r.id));
  let ni=rows.findIndex(r=>r.id===toId);
  if(!before)ni++;
  if(ni<0)ni=rows.length;
  rows.splice(ni,0,...block);
  dragIds=[];render();
  triggerAutosave();
}
function dov(e,id){e.preventDefault();}
function dlv(e,id){}
function dp(e,id){e.preventDefault();}
function extractBlock(idx){
  const r=rows[idx];
  if(r.type==='chap'){
    const bl=[r];
    for(let i=idx+1;i<rows.length;i++){if(rows[i].type==='chap')break;bl.push(rows[i]);}
    return bl;
  }
  if(r.type==='art'){
    const bl=[r];
    for(let i=idx+1;i<rows.length;i++){
      const t=rows[i].type;
      if(t==='subart'||t==='blank'){bl.push(rows[i]);}
      else break;
    }
    return bl;
  }
  if(r.type==='sub'){
    const lv=r.level||1;
    const bl=[r];
    for(let i=idx+1;i<rows.length;i++){
      const t=rows[i].type;
      if(t==='chap')break;
      if(t==='sub'&&(rows[i].level||1)<=lv)break;
      bl.push(rows[i]);
    }
    return bl;
  }
  return[r];
}

/* ═══════════════════════════════════════════
   12. KEYBOARD NAV
═══════════════════════════════════════════ */
function kn(e,id,f){
  if(e.key==='Tab'||(e.key==='Enter'&&f==='p')){
    e.preventDefault();
    const art=rows.filter(r=>r.type==='art'||r.type==='subart');
    const idx=art.findIndex(r=>r.id===id);
    if(f==='q'){fc2(id,'p');return;}
    if(f==='p'){
      if(idx<art.length-1)fc2(art[idx+1].id,'q');
      else{selId=id;addRow('art');}
    }
  }
}
function fc2(id,f){
  setTimeout(()=>{
    const tr=document.getElementById('ro-'+id);if(!tr)return;
    const ins=tr.querySelectorAll('input.ni');
    const inp2=f==='q'?ins[0]:ins[1];
    if(inp2){inp2.focus();inp2.select();}
  },20);
}

  const g=id=>document.getElementById(id)?.value||'#000';
  C={
    chapBg:g('cc-chap-bg'),chapFg:g('cc-chap-fg'),
    sub1Bg:g('cc-sub1-bg'),sub1Fg:g('cc-sub1-fg'),

    tsBg:  g('cc-ts-bg'),  tsFg:  g('cc-ts-fg'),
    tcBg:  g('cc-tc-bg'),  tcFg:  g('cc-tc-fg'),
    gtBg:  g('cc-gt-bg'),  gtFg:  g('cc-gt-fg'),
  };
  render();
  triggerAutosave();
}

/* ═══════════════════════════════════════════
   14. IMPORT / EXPORT
═══════════════════════════════════════════ */
function doExport(){
  if(!rows.length){notif('⚠ Aucune donnée');return;}
  const wb=XLSX.utils.book_new();
  const{nums,letters}=buildNums();
  const{chapT,subT}=computeTotals();
  const l1=document.getElementById('hl1').value;
  const isBPU=mode==='BPU';
  const data=[];
  data.push([l1]);
  data.push([document.getElementById('hl2').value]);
  data.push([document.getElementById('hl3').value]);
  data.push([]);
  data.push([isBPU?'BORDEREAU DES PRIX UNITAIRES':'DETAIL QUANTITATIF ESTIMATIF']);
  data.push([]);

  if(isBPU){
    // BPU: 3-col header (or 2-col if prices hidden)
    const hdr=['N°','DESIGNATION DES OUVRAGES'];
    if(showPrices)hdr.push('PRIX UNITAIRE HT');
    data.push(hdr);
    rows.forEach((r,i)=>{
      const n=nums[i],letter=letters[i];
      const bDesig=r=>r.bpu_desig!==undefined?r.bpu_desig:r.desig;
      const bPu=r=>r.bpu_pu!==undefined?r.bpu_pu:r.pu;
      const bUnite=r=>r.bpu_unite!==undefined?r.bpu_unite:r.unite;
      if(r.type==='chap'){
        const row=[n,r.desig];if(showPrices)row.push('');data.push(row);
      }else if(r.type==='sub'){
        const row=[n,r.desig];if(showPrices)row.push('');data.push(row);
      }else if(r.type==='art'){
        const subline=UNIT_WORDS[bUnite(r)]||(bUnite(r).toUpperCase());
        const desigFull=bDesig(r)+(bDesig(r)?'\n':'')+subline;
        const row=[n,desigFull];
        if(showPrices)row.push(num(bPu(r)));
        data.push(row);
      }else if(r.type==='subart'){
        const subline=UNIT_WORDS[bUnite(r)]||(bUnite(r).toUpperCase());
        const desigFull=bDesig(r)+(bDesig(r)?'\n':'')+subline;
        const row=[letter,desigFull];
        if(showPrices)row.push(num(bPu(r)));
        data.push(row);
      }else if(r.type==='blank'){
        const row=['',r.desig];if(showPrices)row.push('');data.push(row);
      }
    });
    const ws=XLSX.utils.aoa_to_sheet(data);
    ws['!cols']=[{wch:10},{wch:70},...(showPrices?[{wch:16}]:[])];
    XLSX.utils.book_append_sheet(wb,ws,'BPU');
  }else{
    // DQE export
    const hdr=['N°','DESIGNATION DES OUVRAGES','U'];
    if(!showPrices){
      hdr.push('Quantité','PRIX U HT','MONTANT HT');
    }else{
      hdr.push('Quantité','PRIX U HT','MONTANT HT');
    }
    data.push(hdr);
    let chapStk=[],subStk2=[];
    const pst2=()=>{
      while(subStk2.length){
        const s=subStk2.pop();const t=subT[s.id]||0;
        const r=['','Total '+s.desig,'','',showPrices?'':'',showPrices?t:''];data.push(r);
      }
    };
    const pct2=()=>{
      if(!chapStk.length)return;
      const c=chapStk.pop();const t=chapT[c.id]||0;
      const r=['','Total '+c.desig,'','',showPrices?'':'',showPrices?t:''];data.push(r);
    };
    rows.forEach((r,i)=>{
      const n=nums[i],letter=letters[i];
      if(r.type==='chap'){
        pst2();pct2();chapStk.push({id:r.id,desig:r.desig});
        data.push([n,r.desig,'','','','']);
      }else if(r.type==='sub'){
        const lv=r.level||1;
        while(subStk2.length&&subStk2[subStk2.length-1].level>=lv){
          const s=subStk2.pop();const t=subT[s.id]||0;
          data.push(['','Total '+s.desig,'','','',showPrices?t:'']);
        }
        subStk2.push({id:r.id,desig:r.desig,level:lv});
        data.push([n,r.desig,'','','','']);
      }else if(r.type==='art'){
        const hasKids=artHasSubarts(r.id);
        const t=hasKids?artParentTotal(r):artTotal(r);
        data.push([n,r.desig,hasKids?'':r.unite,hasKids?'':num(r.qty),
          showPrices?(hasKids?'':num(r.pu)):'',showPrices?t:'']);
      }else if(r.type==='subart'){
        const t=artTotal(r);
        data.push([letter,r.desig,r.unite,num(r.qty),showPrices?num(r.pu):'',showPrices?t:'']);
      }else if(r.type==='blank'){
        data.push(['',r.desig,'','','','']);
      }
    });
    pst2();pct2();
    if(showPrices){
      const grand=grandTotal();
      const tvaPct=num(document.getElementById('tva').value)/100;
      const tvaAmt=grand*tvaPct;
      data.push([]);
      data.push(['','TOTAL GÉNÉRAL HT','','','',grand]);
      data.push(['','TVA '+document.getElementById('tva').value+'%','','','',tvaAmt]);
      data.push(['','TOTAL TTC','','','',grand+tvaAmt]);
    }
    const ws=XLSX.utils.aoa_to_sheet(data);
    ws['!cols']=[{wch:10},{wch:55},{wch:6},{wch:10},{wch:14},{wch:16}];
    XLSX.utils.book_append_sheet(wb,ws,'DQE');
  }

  XLSX.writeFile(wb,(l1||'devis').replace(/\s+/g,'_').substring(0,40)+'_'+mode+(showPrices?'':'_sans-prix')+'.xlsx');
  notif('✓ Excel exporté');
}

function importExcel(inp) {
    const f = inp.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = e => {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            
            snapshot(); 
            
            let newRows = [];
            json.forEach((row, i) => {
                const numStr = String(row[0]||'').trim();
                const desig = String(row[1]||'').trim();
                if(!numStr && !desig) return;
                
                let type = 'blank';
                let level = 1;
                let qty = row[3]||'';
                let pu = row[4]||'';
                
                if(ROMAN.includes(numStr)) {
                    type = 'chap';
                } else if(/^[a-z]$/.test(numStr)) {
                    type = 'subart';
                } else if(/^\d+\.\d+$/.test(numStr)) {
                    type = 'art';
                } else if(/^\d+$/.test(numStr)) {
                    if(row[2] || row[4]) type = 'art'; 
                    else { type = 'sub'; level = 1; }
                }
                
                const obj = {
                    id: uid(),
                    type,
                    desig,
                    collapsed: false
                };
                
                if(type === 'sub') obj.level = level;
                if(type === 'art' || type === 'subart') {
                    obj.unite = row[2]||'M²';
                    obj.qty = qty;
                    obj.pu = pu;
                }
                
                newRows.push(obj);
            });
            
            rows = newRows;
            nid = rows.length + 10;
            render();
            triggerAutosave();
            notif('✓ Excel Importé');
        } catch(err) {
            console.error(err);
            notif('⚠ Erreur Import Excel');
        }
    };
    reader.readAsArrayBuffer(f);
    inp.value = '';
}

    if(!loadLocal()) {
        rows=[]; 
        render();
    } else {
        render();

    snapshot();
